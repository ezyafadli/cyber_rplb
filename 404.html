<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>404 - Tersesat di Server RPL B</title>
    <link rel="stylesheet" href="style.css"> <style>
        .error-container {
            height: 100vh;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            text-align: center;
            background: #1a1a2e;
            color: white;
            padding: 20px;
        }
        .error-container h1 {
            font-size: 8rem;
            margin: 0;
            color: #00d2ff;
            text-shadow: 0 0 20px rgba(0, 210, 255, 0.5);
        }
        .error-container p {
            font-size: 1.2rem;
            margin-bottom: 30px;
            opacity: 0.8;
        }
        .btn-back {
            padding: 12px 30px;
            background: #00d2ff;
            color: #1a1a2e;
            text-decoration: none;
            border-radius: 50px;
            font-weight: bold;
            transition: 0.3s;
        }
        .btn-back:hover {
            transform: scale(1.1);
            background: #fff;
        }
    </style>
</head>
<body>
    <div class="error-container">
        <h1>404</h1>
        <h2>Waduh, Kamu Tersesat!</h2>
        <p>Sepertinya kamu masuk ke direktori terlarang atau halaman ini sudah dihapus oleh admin RPL B.</p>
        <a href="index.html" class="btn-back">Balik ke Beranda Yuk</a>
    </div>
</body>
</html>
